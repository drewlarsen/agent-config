interface:
  display_name: "SEO Audit"
  short_description: "Read-only SEO + AI-search audit; one focused check or a full launch audit, grounded in the project's own SEO docs"
  default_prompt: "Use the seo-audit skill. With no argument, run the full read-only launch-readiness SEO + AI-search audit. With a target — sitemap, canonicals, headers, hreflang, meta, og, schema, content, ai, links, cwv, a11y, local, search, privacy, measurement — run just that focused check. Either way: discover and defer to the project's own SEO docs, refresh current official guidance for currency-sensitive targets, ground findings in file/route/HTTP/rendered-HTML evidence, and report a Red/Yellow/Green verdict (full) or a Pass/Issues/Blocker mini-verdict (single target). Read-only: no file edits."
