interface:
  display_name: "Code Audit"
  short_description: "Deep at-rest review of finished code for simplicity, DRYness, clarity, naming, and structure — audit (read-only) or fix (behavior-preserving), one lens or all four"
  default_prompt: "Use the code-audit skill. Parse the argument: an optional leading `fix` keyword (mode; absent = read-only audit), then an optional lens — naming, dry, simplicity, structure (absent = all four) — then the rest is the target (module / file / directory / glob, or a free description). Resolve the target to real files first; decide keyword-vs-target by existence, and if a bare `fix`/lens keyword has no following target, ask for the target rather than defaulting to an empty target or silently editing. Read the project's doctrine (AGENTS.md / CLAUDE.md + any design doc near the target) and judge the code against its stated intent, flagging code↔doc drift both ways. Go deep: read the whole target, trace one real path end-to-end, assess copy-paste families as a set, and refute every candidate finding before it ships. Functionality is sacred — no finding or fix changes observable behavior. In audit mode output a structured review: verdict + top findings, findings grouped by lens (each with file:line, severity must-fix/should-fix/taste, why it matters here, and a concrete target shape), then an architecture synthesis with a sequenced cleanup plan. In fix mode apply only behavior-preserving edits (renames update every reference in the same change), then run the project's typecheck/build/tests as a hard gate and revert anything that breaks; report what changed and what you left as a recommendation. Don't commit unless asked. See references/lenses.md for the per-lens smell catalog and the verification recipe."
