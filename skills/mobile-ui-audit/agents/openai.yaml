interface:
  display_name: "Mobile UI Audit"
  short_description: "Evidence-grounded mobile UX audit — drives the site at real phone viewports to prove mobile-designed vs. shrunken-desktop; one focused check or a full Red/Yellow/Green audit"
  default_prompt: "Use the mobile-ui-audit skill. With no argument (or `full`), run the comprehensive mobile audit; with a target — touch, nav, reading, forms, device-fit, gestures, perf, media, pwa — run just that focused check (run `media` only if the app plays media; `pwa` only when native-parity is a goal). Method: stay read-only on the source (write only your own report); detect the stack and defer to the project's design docs, flagging code↔doc drift and respecting intentional-by-design behavior; derive the real surface list from the router. Then DRIVE the app — never audit from code alone: run the agent dev server (never the human's; use a temp/free port if no convention is documented) and exercise it at 390×844, 360×800, 430×932, and 844×390, inspecting computed CSS (touch targets, font sizes, line length, fixed-bar heights), focusing inputs, and screenshotting. The bar is mobile-optimized, not 'looks ok at 390px' — litmus: can someone finish the task one-thumbed, on a slow network, while distracted? Evidence or it didn't happen: every finding cites a file:line AND a screenshot or measured value. Audit as the product owner (frame top clusters as /decide briefs if available) and as an architect (separate root causes from symptoms). Deliver: a Red/Yellow/Green verdict (or Pass/Issues/Blocker for a single target), a prioritized P0/P1/P2 findings table (surface · file:line · evidence · one-line fix), decision briefs for the top clusters, a sequenced quick-wins→structural-bets roadmap, and a screenshot evidence appendix (plus a native-parity scorecard for the pwa target). See references/audit-sections.md for the per-section checks, the shrunken-desktop tell-test, and the external rubrics to cite."
